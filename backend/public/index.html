<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat IA — GPT-4o</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      padding: 14px 24px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; color: #f1f5f9; }
    header p  { font-size: 12px; color: #64748b; margin-top: 2px; }

    #clear-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    #clear-btn:hover { background: #334155; color: #e2e8f0; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #475569;
      text-align: center;
    }
    #empty-state h2 { font-size: 20px; color: #64748b; font-weight: 500; }
    #empty-state p  { font-size: 14px; }

    .message {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user {
      background: #3b82f6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .typing {
      background: #1e293b;
      color: #64748b;
      border: 1px solid #334155;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 13px;
    }

    footer {
      padding: 14px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      flex-shrink: 0;
    }

    form { display: flex; gap: 10px; }

    input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus       { border-color: #3b82f6; }
    input::placeholder { color: #475569; }
    input:disabled    { opacity: 0.5; }

    button[type="submit"] {
      background: #3b82f6;
      border: none;
      color: #fff;
      padding: 11px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button[type="submit"]:hover    { background: #2563eb; }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Chat IA</h1>
    <p>Powered by GPT-4o</p>
  </div>
  <button id="clear-btn" onclick="clearChat()">Limpar conversa</button>
</header>

<div id="chat">
  <div id="empty-state">
    <h2>Olá! Como posso ajudar?</h2>
    <p>Digite uma mensagem abaixo para começar.</p>
  </div>
</div>

<footer>
  <form onsubmit="sendMessage(event)">
    <input id="input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
    <button type="submit" id="send-btn">Enviar</button>
  </form>
</footer>

<script>
  const chatEl  = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  function removeEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function appendMessage(role, content) {
    removeEmptyState();
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = content;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  async function loadHistory() {
    try {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      msgs.forEach(m => appendMessage(m.role, m.content));
    } catch (_) {}
  }

  async function sendMessage(e) {
    e.preventDefault();
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    inputEl.disabled = true;

    appendMessage('user', message);

    const typing = appendMessage('typing', 'Digitando...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      typing.remove();
      appendMessage('assistant', data.reply || data.error || 'Erro desconhecido.');
    } catch (_) {
      typing.remove();
      appendMessage('assistant', 'Erro ao conectar com o servidor.');
    }

    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }

  async function clearChat() {
    if (!confirm('Deseja apagar toda a conversa?')) return;
    await fetch('/api/messages', { method: 'DELETE' });
    chatEl.innerHTML = `
      <div id="empty-state">
        <h2>Olá! Como posso ajudar?</h2>
        <p>Digite uma mensagem abaixo para começar.</p>
      </div>`;
  }

  loadHistory();
</script>
</body>
</html>
